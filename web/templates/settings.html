{% extends "layout.html" %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow-sm">

        <div class="card-header">

            <h3>

                System Settings

            </h3>

        </div>

        <div class="card-body">
            <form method="POST"></form>
            <table class="table table-bordered">

                <tr>

                    <th>Target Network</th>

                    <td>

                    <input

                        type="text"

                        name="target_network"

                        class="form-control"

                        value="{{ settings.target_network }}"

                    >

                    </td>

                </tr>

                <tr>

                    <th>Scan Timeout</th>

                    <td>

                    <input

                        type="number"

                        name="scan_timeout"

                        class="form-control"

                        value="{{ settings.scan_timeout }}"

                    >

                    </td>

                </tr>

                <tr>

                    <th>Port Timeout</th>

                    <td>

                    <input

                        type="number"

                        step="0.1"

                        name="port_scan_timeout"

                        class="form-control"

                        value="{{ settings.port_scan_timeout }}"

                    >

                    </td>

                </tr>

                <tr>

                    <th>Worker Threads</th>

                    <td>

                    <input

                        type="number"

                        name="common_threads"

                        class="form-control"

                        value="{{ settings.common_threads }}"

                    >

                    </td>

                </tr>

                <tr>

                    <th>Banner Grabbing</th>

                    <td>

                    <input

                        type="checkbox"

                        name="banner_enabled"

                        {% if settings.banner_enabled %}

                        checked

                        {% endif %}

                    >

                    </td>

                </tr>

                <tr>

                    <th>OS Fingerprinting</th>

                    <td>

                    <input

                        type="checkbox"

                        name="os_enabled"

                        {% if settings.os_fingerprinting_enabled %}

                        checked

                        {% endif %}

                    >

                </td>

                </tr>

                <tr>

                    <th>Vendor Lookup</th>

                    <td>

                    <input

                        type="checkbox"

                        name="vendor_enabled"

                        {% if settings.vendor_lookup_enabled %}

                        checked

                        {% endif %}

                    >

                </td>

                </tr>

                <tr>

                    <th>TXT Reports</th>

                    <td>

                    <input

                        type="checkbox"

                        name="report_txt"

                        {% if settings.report_txt_enabled %}

                        checked

                        {% endif %}

                    >

                </td>

                </tr>

                <tr>

                    <th>CSV Reports</th>

                    <td>

                    <input

                        type="checkbox"

                        name="report_csv"

                        {% if settings.report_csv_enabled %}

                        checked

                        {% endif %}

                    >

                </td>

                </tr>

                <tr>

                    <th>PDF Reports</th>

                    <td>

                    <input

                        type="checkbox"

                        name="report_pdf"

                        {% if settings.report_pdf_enabled %}

                        checked

                        {% endif %}

                    >

                </td>

                </tr>

            </table>
            <div class="mt-4">

                <button

                    type="submit"

                    class="btn btn-primary"

                >

                    Save Settings

                </button>

            </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
