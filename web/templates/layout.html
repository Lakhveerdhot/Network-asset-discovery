<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Network Asset Discovery Platform
    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Custom CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<div class="wrapper">

    <!-- =============================== -->
    <!-- Sidebar                         -->
    <!-- =============================== -->

    <aside class="sidebar">

        <div class="logo">

            <i class="bi bi-router-fill"></i>

            <span>

                NADP

            </span>

        </div>

        <ul class="menu">

            <!-- Dashboard -->

            <li class="{% if request.path == '/' %}active{% endif %}">

                <a href="/">

                    <i class="bi bi-speedometer2"></i>

                    Dashboard

                </a>

            </li>

            <!-- Assets -->

            <li class="{% if request.path == '/assets' %}active{% endif %}">

                <a href="/assets">

                    <i class="bi bi-pc-display"></i>

                    Assets

                </a>

            </li>

            <!-- Reports -->

            <li class="{% if request.path == '/reports' %}active{% endif %}">

                <a href="/reports">

                    <i class="bi bi-file-earmark-text"></i>

                    Reports

                </a>

            </li>

            <!-- Scheduler -->

            <li class="{% if request.path == '/scheduler' %}active{% endif %}">

                <a href="/scheduler">

                    <i class="bi bi-clock-history"></i>

                    Scheduler

                </a>

            </li>

            <!-- Settings -->

            <li class="{% if request.path == '/settings' %}active{% endif %}">

                <a href="/settings">

                    <i class="bi bi-gear-fill"></i>

                    Settings

                </a>

            </li>

        </ul>

    </aside>

    <!-- =============================== -->
    <!-- Main Content                    -->
    <!-- =============================== -->

    <main class="content">

        <!-- Navbar -->

        <nav class="topbar">

            <div>

                <h3>

                    Network Asset Discovery Platform

                </h3>

            </div>

            <div class="topbar-right">

                <button
                    class="btn btn-success"
                >

                    <i class="bi bi-arrow-repeat"></i>

                    Run Scan

                </button>

            </div>

        </nav>

        <div class="page-content">

            {% block content %}

            {% endblock %}

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
